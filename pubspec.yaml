name: expense_control_app
description: App de control de gastos con arquitectura limpia e Isar local.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  dio: ^5.9.0
  shared_preferences: ^2.3.2
  isar: ^3.1.0+1
  path_provider: ^2.1.5
  intl: ^0.20.2
  fl_chart: ^0.69.2
  liquid_glass_easy: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.11
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/env/dev.json
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
